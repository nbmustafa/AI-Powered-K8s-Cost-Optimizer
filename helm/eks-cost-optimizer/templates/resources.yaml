---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eks-cost-optimizer.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eks-cost-optimizer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "eks-cost-optimizer.selectorLabels" . | nindent 4 }}

---
# ServiceAccount
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eks-cost-optimizer.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
{{- end }}

---
# HPA
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "eks-cost-optimizer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "eks-cost-optimizer.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}

---
# PodDisruptionBudget
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "eks-cost-optimizer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "eks-cost-optimizer.selectorLabels" . | nindent 6 }}
{{- end }}

---
# Ingress
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "eks-cost-optimizer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "eks-cost-optimizer.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}

---
# ExternalSecret — injects ANTHROPIC_API_KEY from AWS Secrets Manager
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "eks-cost-optimizer.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "eks-cost-optimizer.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
    {{- end }}
{{- end }}

---
# NetworkPolicy — restrict ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "eks-cost-optimizer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eks-cost-optimizer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "eks-cost-optimizer.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
  egress:
    # K8s API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Prometheus (monitoring namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Anthropic API + AWS APIs (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
