version: "3.9"

# ── EKS Cost Optimizer — Local Dev Stack ──────────────────────────────────────
#
# Two dev modes:
#
# MODE A — full stack (matches production container exactly):
#   docker compose up -d
#   open http://localhost:8080
#   React is built inside the container; API + UI share port 8080.
#
# MODE B — hot-reload frontend (faster iteration):
#   docker compose up -d backend prometheus
#   cd frontend && npm install && npm start   # CRA dev server on :3000
#   The package.json "proxy" field forwards /api/* to backend :8080.
#   open http://localhost:3000
#
# Prerequisites:
#   export ANTHROPIC_API_KEY=sk-ant-...

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: eks-cost-optimizer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      K8S_IN_CLUSTER: "false"
      KUBECONFIG: /root/.kube/config
      CLUSTER_NAME: ${CLUSTER_NAME:-local-dev}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Please export ANTHROPIC_API_KEY}
      PROMETHEUS_URL: http://prometheus:9090
      CACHE_TTL_SECONDS: "60"
      LOG_LEVEL: "DEBUG"
      # Empty string = same-origin (React served from the same :8080)
      API_URL: ""
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
      - ${HOME}/.aws:/root/.aws:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - eks-optimizer

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: eks-cost-optimizer-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./local-dev/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - eks-optimizer

  grafana:
    image: grafana/grafana:11.2.0
    container_name: eks-cost-optimizer-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - grafana
    networks:
      - eks-optimizer

volumes:
  prometheus_data:
  grafana_data:

networks:
  eks-optimizer:
    driver: bridge
